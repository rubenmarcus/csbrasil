<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>bot weapon view</title>
<style>body{margin:0;background:#2a2e35}</style>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { CHARACTERS } from './js/characters.js';
import { preloadCharacterAssets, buildCharacterModel, GLB_CHARS } from './js/glbchars.js';

const qp = new URLSearchParams(location.search);
const CHAR = qp.get('char') || 'mst';
const WEAPON = qp.get('w') || 'ak';
const POSE = qp.get('anim') || 'idle';

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2e35);
scene.add(new THREE.HemisphereLight(0xffffff, 0x445566, 1.2));
const d = new THREE.DirectionalLight(0xffffff, 1.4); d.position.set(2, 4, 3); scene.add(d);

const def = CHARACTERS.find(c => c.id === CHAR);
await preloadCharacterAssets([CHAR]);
const built = buildCharacterModel(def, { weaponId: WEAPON });
if (!built) { document.body.innerHTML = 'no model ' + CHAR; throw new Error('no model'); }
scene.add(built.group);
// settle into the pose
for (let i = 0; i < 30; i++) built.ctrl.update(1 / 30, 0, false, 0);
if (POSE !== 'idle') for (let i = 0; i < 20; i++) built.ctrl.update(1 / 30, 1, POSE === 'run' ? false : true, POSE === 'run' ? 3.3 : 1.2);

const cam = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 50);
window.BVIEW = {
  ready: true,
  view(px, py, pz, tx, ty, tz) { cam.position.set(px, py, pz); cam.lookAt(tx, ty, tz); renderer.render(scene, cam); },
};
window.BVIEW.view(1.7, 1.35, 2.1, 0, 0.95, 0);
</script>
</body>
</html>
