name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Syntax check do jogo (public/js)
        run: for f in public/js/*.js; do node --input-type=module --check < "$f"; done
      - name: Astro build
        run: npm run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extrair notas do CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[$TAG\\]/{f=1;next}/^## \\[/{f=0}f" CHANGELOG.md > release-body.md
          [ -s release-body.md ] || echo "Ver commits abaixo." > release-body.md
      - name: Criar GitHub Release
        run: gh release create "${{ github.ref_name }}" --notes-file release-body.md --title "CS BRASIL ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
